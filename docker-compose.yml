services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: swifttalk
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
  redis:
    image: redis:6.2
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  server:
    build: ./server
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: mysql://root:secret@mysql:3306/swifttalk  # override only these
      REDIS_URL: redis://redis:6379
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  client:
    build: 
      context: ./client
      args:
        VITE_APP_API_URL:  ${VITE_APP_API_URL}
        VITE_APP_SOCKET_URL: ${VITE_APP_SOCKET_URL}
    ports:
      - "3000:80"
    depends_on:
      server:
